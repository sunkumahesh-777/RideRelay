<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./ride-relay-symbol-white.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RideRelay</title>
    <script>
      function showRideRelayStartupIssue(title, message) {
        var render = function () {
          var root = document.getElementById('root');
          if (!root || root.children.length) return;
          root.innerHTML = '<div style="min-height:100vh;background:#00130f;color:#fff;display:grid;place-items:center;font-family:Arial,sans-serif;padding:24px"><div style="max-width:760px;border:1px solid #2dd4bf;border-radius:16px;padding:24px;background:#081820"><h1 style="margin:0 0 12px;color:#5eead4">' + title + '</h1><p>The app loaded but hit this problem:</p><pre style="white-space:pre-wrap;background:#03100c;padding:16px;border-radius:12px">' + message + '</pre></div></div>';
        };

        if (document.getElementById('root')) {
          render();
        } else {
          window.addEventListener('DOMContentLoaded', render, { once: true });
        }
      }

      window.addEventListener('error', function (event) {
        showRideRelayStartupIssue('RideRelay startup issue', event.message || 'Unknown error');
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason && (event.reason.message || event.reason.stack) || event.reason || 'Unknown error';
        showRideRelayStartupIssue('RideRelay startup issue', reason);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
